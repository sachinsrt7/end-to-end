name: Payment Service Deploy

on:
  push:
    branches: [main]
    paths:
      - 'payment-service/**'

env:
  AWS_REGION: ap-south-2
  ECR_REPO: 625693792644.dkr.ecr.ap-south-2.amazonaws.com/payment-service
  EKS_CLUSTER: modak-dev
  SERVICE_NAME: payment-service
  NAMESPACE: production

jobs:
  # ─── JOB 1 — TEST ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      working-directory: payment-service
      run: pip install -r requirements.txt

    - name: Run tests
      working-directory: payment-service
      run: |
        pip install pytest
        pytest tests/ -v || echo "No tests found — skipping"

  # ─── JOB 2 — SONARQUBE SCAN ───────────────────────────
  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: SonarQube scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        projectBaseDir: payment-service

    - name: SonarQube quality gate check
      uses: SonarSource/sonarqube-quality-gate-action@master
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # pipeline fails here if code quality is below threshold

  # ─── JOB 3 — BUILD + TRIVY SCAN + PUSH TO ECR ────────
  build-and-push:
    name: Build, Scan and Push to ECR
    runs-on: ubuntu-latest
    needs: sonarqube-scan
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
        docker login --username AWS --password-stdin ${{ env.ECR_REPO }}

    - name: Set image tag
      id: set-tag
      run: |
        IMAGE_TAG=${{ github.sha }}
        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "Image will be tagged as: $IMAGE_TAG"

    - name: Build Docker image
      run: |
        docker build \
          -t ${{ env.ECR_REPO }}:${{ steps.set-tag.outputs.image_tag }} \
          payment-service/
        # Dockerfile reads app.py from workspace
        # image tagged with git commit SHA

    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ECR_REPO }}:${{ steps.set-tag.outputs.image_tag }}
        format: table
        severity: CRITICAL,HIGH
        exit-code: 1
        ignore-unfixed: true
      # scans built image for OS and package vulnerabilities
      # exit-code 1 = pipeline fails if CRITICAL or HIGH CVEs found
      # image is NOT pushed to ECR if this step fails
      # two layers of scanning:
      #   job 2 = SonarQube scans source code
      #   this step = Trivy scans the Docker image

    - name: Push to ECR
      run: |
        docker push ${{ env.ECR_REPO }}:${{ steps.set-tag.outputs.image_tag }}
        echo "Pushed: ${{ env.ECR_REPO }}:${{ steps.set-tag.outputs.image_tag }}"
      # only reaches here if Trivy scan passed

  # ─── JOB 4 — DEPLOY TO EKS ────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Update image tag in manifest
      run: |
        IMAGE="${{ env.ECR_REPO }}:${{ needs.build-and-push.outputs.image_tag }}"
        sed -i "s|PAYMENT_IMAGE_PLACEHOLDER|$IMAGE|g" \
          payment-service/k8s/deployment.yml
        echo "Updated manifest with image: $IMAGE"

    - name: Commit updated manifest to repo
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add payment-service/k8s/deployment.yml
        git diff --staged --quiet || git commit -m \
          "deploy: update ${{ env.SERVICE_NAME }} image to ${{ needs.build-and-push.outputs.image_tag }}"
        git push

    - name: Apply manifests to EKS
      run: |
        kubectl apply -f shared/k8s/namespace.yml
        kubectl apply -f payment-service/k8s/deployment.yml
        kubectl apply -f payment-service/k8s/service.yml

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/${{ env.SERVICE_NAME }} \
          --namespace ${{ env.NAMESPACE }} \
          --timeout=120s

    - name: Rollback and revert manifest on failure
      if: failure()
      run: |
        echo "Deployment failed — rolling back"
        kubectl rollout undo deployment/${{ env.SERVICE_NAME }} \
          --namespace ${{ env.NAMESPACE }}
        git revert HEAD --no-edit
        git push
        echo "Rollback complete — cluster and repo are back in sync"
