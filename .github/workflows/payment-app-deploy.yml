name: Payment Service Deploy

on:
  push:
    branches: [main]
    paths:
      - 'payment-service/**'   # only triggers when payment-service files change

env:
  AWS_REGION: ap-south-2
  ECR_REPO: 625693792644.dkr.ecr.ap-south-2.amazonaws.com/payment-service
  EKS_CLUSTER: modak-dev
  SERVICE_NAME: payment-service
  NAMESPACE: production

jobs:
  # ─── JOB 1 — TEST ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      working-directory: payment-service
      run: pip install -r requirements.txt

    - name: Run tests
      working-directory: payment-service
      run: |
        pip install pytest
        pytest tests/ -v || echo "No tests found — skipping"
      # once you add tests/ folder with test files, pytest picks them up automatically

  # ─── JOB 2 — SONARQUBE SCAN ───────────────────────────
  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test       # only runs if test job passed

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0    # full history needed for sonar blame info

    - name: SonarQube scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        projectBaseDir: payment-service

    - name: SonarQube quality gate check
      uses: SonarSource/sonarqube-quality-gate-action@master
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # pipeline fails here if code quality is below threshold
      # next job (push to ECR) will NOT run if this fails

  # ─── JOB 3 — BUILD + PUSH TO ECR ─────────────────────
  build-and-push:
    name: Build Image and Push to ECR
    runs-on: ubuntu-latest
    needs: sonarqube-scan    # only runs if sonar scan passed
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}    # passes image tag to job 4

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
        docker login --username AWS --password-stdin ${{ env.ECR_REPO }}

    - name: Set image tag
      id: set-tag
      run: |
        IMAGE_TAG=${{ github.sha }}
        echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "Image will be tagged as: $IMAGE_TAG"

    - name: Build Docker image
      run: |
        docker build \
          -t ${{ env.ECR_REPO }}:${{ steps.set-tag.outputs.image_tag }} \
          payment-service/
        # Dockerfile in payment-service/ is read automatically
        # app.py is copied into the image during build
        # image is tagged with the git commit SHA

    - name: Push to ECR
      run: |
        docker push ${{ env.ECR_REPO }}:${{ steps.set-tag.outputs.image_tag }}
        echo "Pushed: ${{ env.ECR_REPO }}:${{ steps.set-tag.outputs.image_tag }}"

  # ─── JOB 4 — DEPLOY TO EKS ────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push    # only runs if image was pushed successfully

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}   # needed to commit manifest back

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Update image tag in manifest
      run: |
        IMAGE="${{ env.ECR_REPO }}:${{ needs.build-and-push.outputs.image_tag }}"
        sed -i "s|PAYMENT_IMAGE_PLACEHOLDER|$IMAGE|g" \
          payment-service/k8s/deployment.yml
        echo "Updated manifest with image: $IMAGE"

    - name: Commit updated manifest to repo
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add payment-service/k8s/deployment.yml
        git diff --staged --quiet || git commit -m \
          "deploy: update ${{ env.SERVICE_NAME }} image to ${{ needs.build-and-push.outputs.image_tag }}"
        git push
      # git diff --staged --quiet = only commits if file actually changed
      # avoids empty commits if image tag is same

    - name: Apply manifests to EKS
      run: |
        kubectl apply -f shared/k8s/namespace.yml
        kubectl apply -f payment-service/k8s/deployment.yml
        kubectl apply -f payment-service/k8s/service.yml

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/${{ env.SERVICE_NAME }} \
          --namespace ${{ env.NAMESPACE }} \
          --timeout=120s

    - name: Rollback and revert manifest on failure
      if: failure()
      run: |
        echo "Deployment failed — rolling back"

        # step 1 — rollback K8s to previous image instantly
        kubectl rollout undo deployment/${{ env.SERVICE_NAME }} \
          --namespace ${{ env.NAMESPACE }}

        # step 2 — revert manifest commit so repo matches cluster
        git revert HEAD --no-edit
        git push

        echo "Rollback complete — cluster and repo are back in sync"
