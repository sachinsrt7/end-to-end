name: Infra Destroy

on:
  workflow_dispatch:    # manual trigger only — safety measure

env:
  AWS_REGION: ap-south-2
  TF_DIR: infra/envs/dev
  EKS_CLUSTER: modak-dev

jobs:
  infra-destroy:
    name: Destroy VPC and EKS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.13.0'

    - name: Delete nginx Load Balancer first
      run: |
        helm uninstall ingress-nginx -n ingress-nginx || true
        echo "Waiting for Load Balancer to be deleted..."
        sleep 60
      # must delete LB before VPC destroy
      # otherwise VPC destroy fails — LB is still attached
      # || true = don't fail if nginx wasn't installed

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.6.0"

    - name: Terraform Init
      working-directory: ${{ env.TF_DIR }}
      run: terraform init

    - name: Terraform Destroy
      working-directory: ${{ env.TF_DIR }}
      run: terraform destroy -auto-approve
      # destroys: EKS cluster, node groups, VPC, subnets,
      # IAM roles, internet gateway, route tables
      # takes 15-20 minutes