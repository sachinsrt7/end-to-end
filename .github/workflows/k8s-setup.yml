name: K8s Cluster Setup

on:
  workflow_dispatch:    # manual trigger only — run once after EKS is created

env:
  AWS_REGION: ap-south-2
  EKS_CLUSTER: modak-dev

jobs:
  # ─── JOB 1 — NAMESPACE ────────────────────────────────
  create-namespace:
    name: Create Namespace
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Create production namespace
      run: |
        kubectl apply -f shared/k8s/namespace.yml
        kubectl get namespace production
      # namespace.yml creates the "production" namespace
      # all app pods, services, ingress live inside this namespace

  # ─── JOB 2 — NGINX INGRESS CONTROLLER ────────────────
  install-nginx-ingress:
    name: Install Nginx Ingress Controller
    runs-on: ubuntu-latest
    needs: create-namespace    # namespace must exist first

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.13.0'

    - name: Add nginx ingress Helm repo
      run: |
        helm repo add ingress-nginx \
          https://kubernetes.github.io/ingress-nginx
        helm repo update

    - name: Install nginx ingress controller
      run: |
        helm upgrade --install ingress-nginx \
          ingress-nginx/ingress-nginx \
          --namespace ingress-nginx \
          --create-namespace \
          --set controller.replicaCount=2 \
          --wait
        # creates an AWS NLB (Network Load Balancer) automatically
        # external traffic hits NLB → nginx controller → routes to services

    - name: Get Load Balancer URL
      run: |
        echo "Waiting for Load Balancer to be assigned..."
        kubectl wait --namespace ingress-nginx \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=controller \
          --timeout=120s
        kubectl get svc -n ingress-nginx
        echo ""
        echo "Your Load Balancer URL:"
        kubectl get svc ingress-nginx-controller \
          -n ingress-nginx \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
      # copy this URL — use it to hit your services from browser

  # ─── JOB 3 — INGRESS ROUTING RULES ───────────────────
  apply-ingress-rules:
    name: Apply Ingress Routing Rules
    runs-on: ubuntu-latest
    needs: install-nginx-ingress    # nginx must be installed first

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Apply ingress routing rules
      run: |
        kubectl apply -f shared/k8s/ingress.yml
        kubectl get ingress -n production
      # ingress.yml tells nginx:
      # /pay  → route to payment-service
      # /auth → route to auth-service
