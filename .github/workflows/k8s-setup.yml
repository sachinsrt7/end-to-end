name: K8s Cluster Setup

on:
  pull_request:
    branches: [main]
    paths:
      - 'shared/k8s/**'    # plan runs on PR when k8s files change

  push:
    branches: [main]
    paths:
      - 'shared/k8s/**'    # apply runs on merge to main

env:
  AWS_REGION: ap-south-2
  EKS_CLUSTER: modak-dev

jobs:
  # ─── PREVIEW — runs on PR only ────────────────────────
  k8s-dry-run:
    name: K8s Dry Run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.13.0'

    - name: Dry run namespace
      run: |
        kubectl apply -f shared/k8s/namespace.yml --dry-run=server
        # dry-run=server validates against real cluster
        # shows what would be created without creating it

    - name: Dry run ingress rules
      run: |
        kubectl apply -f shared/k8s/ingress.yml --dry-run=server

    - name: Helm dry run nginx ingress
      run: |
        helm repo add ingress-nginx \
          https://kubernetes.github.io/ingress-nginx
        helm repo update
        helm upgrade --install ingress-nginx \
          ingress-nginx/ingress-nginx \
          --namespace ingress-nginx \
          --create-namespace \
          --dry-run
        # shows what helm would install without actually installing

  # ─── APPLY — runs on merge to main only ──────────────
  k8s-setup:
    name: K8s Setup
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.13.0'

    - name: Job 1 — Create namespace
      run: |
        kubectl apply -f shared/k8s/namespace.yml
        kubectl get namespace production

    - name: Job 2 — Install nginx ingress controller
      run: |
        helm repo add ingress-nginx \
          https://kubernetes.github.io/ingress-nginx
        helm repo update
        helm upgrade --install ingress-nginx \
          ingress-nginx/ingress-nginx \
          --namespace ingress-nginx \
          --create-namespace \
          --set controller.replicaCount=2 \
          --wait

    - name: Job 3 — Apply ingress routing rules
      run: |
        kubectl apply -f shared/k8s/ingress.yml
        kubectl get ingress -n production

    - name: Get Load Balancer URL
      run: |
        kubectl get svc ingress-nginx-controller \
          -n ingress-nginx \
          -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'