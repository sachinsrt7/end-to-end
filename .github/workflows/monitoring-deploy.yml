name: Monitoring Deploy

on:
  workflow_dispatch:    # manual trigger only

env:
  AWS_REGION: ap-south-2
  EKS_CLUSTER: modak-dev

jobs:
  deploy-monitoring:
    name: Install Prometheus and Grafana
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.13.0'

    - name: Add Prometheus Helm repo
      run: |
        helm repo add prometheus-community \
          https://prometheus-community.github.io/helm-charts
        helm repo update

    - name: Install kube-prometheus-stack
      run: |
        helm upgrade --install monitoring \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --create-namespace \
          -f shared/k8s/monitoring/prometheus-values.yml \
          --wait
        # --wait = helm waits until all pods are running before marking success
        # upgrade --install = installs if not present, upgrades if already installed

    - name: Verify monitoring pods are running
      run: |
        kubectl get pods -n monitoring
        echo ""
        echo "Access Grafana locally with:"
        echo "kubectl port-forward svc/monitoring-grafana 3000:80 -n monitoring"
        echo "Username: admin"
        echo "Password: Admin1234!"
