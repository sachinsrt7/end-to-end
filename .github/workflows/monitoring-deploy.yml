name: Monitoring Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'shared/k8s/monitoring/**'

  push:
    branches: [main]
    paths:
      - 'shared/k8s/monitoring/**'

env:
  AWS_REGION: ap-south-2
  EKS_CLUSTER: modak-dev

jobs:
  monitoring-dry-run:
    name: Monitoring Dry Run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.13.0'

    - name: Add Prometheus repo
      run: |
        helm repo add prometheus-community \
          https://prometheus-community.github.io/helm-charts
        helm repo update

    - name: Helm dry run
      run: |
        helm upgrade --install monitoring \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --create-namespace \
          -f shared/k8s/monitoring/prometheus-values.yml \
          --dry-run

  monitoring-deploy:
    name: Install Prometheus and Grafana
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.13.0'

    - name: Add Prometheus repo
      run: |
        helm repo add prometheus-community \
          https://prometheus-community.github.io/helm-charts
        helm repo update

    - name: Install kube-prometheus-stack
      run: |
        helm upgrade --install monitoring \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --create-namespace \
          -f shared/k8s/monitoring/prometheus-values.yml \
          --wait

    - name: Verify monitoring pods
      run: |
        kubectl get pods -n monitoring
        echo ""
        echo "Access Grafana:"
        echo "kubectl port-forward svc/monitoring-grafana 3000:80 -n monitoring"
        echo "Username: admin / Password: Admin1234!"