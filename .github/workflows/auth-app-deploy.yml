name: Auth Service Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'auth-service/**'

  push:
    branches: [main]
    paths:
      - 'auth-service/**'

env:
  AWS_REGION: ap-south-2
  ECR_REPO: 625693792644.dkr.ecr.ap-south-2.amazonaws.com/auth-service
  EKS_CLUSTER: modak-dev
  SERVICE_NAME: auth-service
  NAMESPACE: production

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      working-directory: auth-service
      run: pip install -r requirements.txt

    - name: Run tests
      working-directory: auth-service
      run: |
        pip install pytest
        pytest tests/ -v || echo "No tests found — skipping"

  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: SonarQube scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        projectBaseDir: auth-service

    - name: SonarQube quality gate check
      uses: SonarSource/sonarqube-quality-gate-action@master
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-scan:
    name: Build and Scan Image
    runs-on: ubuntu-latest
    needs: sonarqube-scan

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build \
          -t ${{ env.ECR_REPO }}:${{ github.sha }} \
          auth-service/

    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ECR_REPO }}:${{ github.sha }}
        format: table
        severity: CRITICAL,HIGH
        exit-code: 1
        ignore-unfixed: true

  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
        docker login --username AWS --password-stdin ${{ env.ECR_REPO }}

    - name: Build and push image
      run: |
        docker build \
          -t ${{ env.ECR_REPO }}:${{ github.sha }} \
          auth-service/
        docker push ${{ env.ECR_REPO }}:${{ github.sha }}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER }} \
          --region ${{ env.AWS_REGION }}

    - name: Update image tag in manifest
      run: |
        IMAGE="${{ env.ECR_REPO }}:${{ github.sha }}"
        sed -i "s|AUTH_IMAGE_PLACEHOLDER|$IMAGE|g" \
          auth-service/k8s/deployment.yml

    - name: Commit updated manifest
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add auth-service/k8s/deployment.yml
        git diff --staged --quiet || git commit -m \
          "deploy: update ${{ env.SERVICE_NAME }} image to ${{ github.sha }}"
        git push

    - name: Apply to EKS
      run: |
        kubectl apply -f shared/k8s/namespace.yml
        kubectl apply -f auth-service/k8s/deployment.yml
        kubectl apply -f auth-service/k8s/service.yml

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/${{ env.SERVICE_NAME }} \
          --namespace ${{ env.NAMESPACE }} \
          --timeout=120s

    - name: Rollback on failure
      if: failure()
      run: |
        kubectl rollout undo deployment/${{ env.SERVICE_NAME }} \
          --namespace ${{ env.NAMESPACE }}
        git revert HEAD --no-edit
        git push